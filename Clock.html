<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>다각형 시계 (Geometric Network Style)</title>
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
      background-color: black;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      /* AM/PM 테마 전환 시 부드러운 애니메이션 효과 */
      transition: background 0.8s ease, color 0.8s ease;
    }

    /* 오전(AM) 테마: 흰색 배경, 검은색 선 */
    body.am {
      background: white;
      color: black;
    }

    /* 오후(PM) 테마: 검은색 배경, 흰색 선 */
    body.pm {
      background: black;
      color: white;
    }

    /* 1080x1920 (9:16) 비율을 유지하는 컨테이너 */
    .clock-container {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-evenly;
      align-items: center;
      width: 100%;
      height: 100%;
      max-width: 1080px;
      max-height: 1920px;
    }

    /* 화면이 넓을 때 (가로형 모니터 등) 9:16 비율 강제 적용 */
    @media (min-aspect-ratio: 9/16) {
      .clock-container {
        width: calc(100vh * 9 / 16);
      }
    }

    /* 화면이 좁고 길 때 (너무 좁은 모바일 등) 9:16 비율 강제 적용 */
    @media (max-aspect-ratio: 9/16) {
      .clock-container {
        height: calc(100vw * 16 / 9);
      }
    }

    /* SVG 도형 크기 설정 */
    svg {
      width: 75%; /* 컨테이너 가로폭의 75% 차지 */
      height: auto;
      transition: all 0.3s ease;
    }

    /* 다각형 및 바깥쪽 동심원 굵은 실선 스타일 */
    polygon, circle.ring {
      fill: none;
      stroke: currentColor;
      stroke-width: 1.2;
      stroke-linejoin: round;
    }

    /* 기하학적 내부 점선 스타일 */
    line.dashed {
      fill: none;
      stroke: currentColor;
      stroke-width: 0.4; /* 테두리보다 얇게 설정하여 입체감 부여 */
      stroke-dasharray: 2 3; /* 점선 간격 설정 */
    }

    /* 다각형 꼭짓점(노드) 스타일 */
    circle.node {
      fill: currentColor;
      stroke: none;
    }
  </style>
</head>
<body>
  
  <div class="clock-container" id="clock"></div>

  <script>
    const clock = document.querySelector("#clock");

    // 값이 30일 때를 기준으로 동심원을 만들고 리셋하는 함수
    function createShape(timeValue) {
      // 30 단위로 나누어 몫은 동심원의 개수, 나머지는 내부 다각형의 각 수로 사용
      // (timeValue 0 = 3각형, timeValue 30 = 동심원 1개 + 3각형)
      const rings = Math.floor(timeValue / 30);
      const innerSides = (timeValue % 30) + 3;
      
      let svgContent = '';
      
      // 1. 바깥쪽 동심원 그리기
      for (let i = 0; i < rings; i++) {
        // 반지름을 3씩 줄여가며 나이테처럼 생성
        const ringRadius = 48 - (i * 3);
        svgContent += `<circle cx="50" cy="50" r="${ringRadius}" class="ring" />`;
      }
      
      // 2. 안쪽 다각형의 꼭짓점 좌표 계산
      const polyRadius = 48 - (rings * 3);
      const coords = []; // 내부 점선을 그리기 위해 좌표 보관
      const points = [];
      let nodes = '';
      
      for (let i = 0; i < innerSides; i++) {
        const angle = (i * 2 * Math.PI / innerSides) - (Math.PI / 2); // 12시 방향부터 시작
        const x = 50 + polyRadius * Math.cos(angle);
        const y = 50 + polyRadius * Math.sin(angle);
        
        coords.push({x, y});
        points.push(`${x},${y}`);
        nodes += `<circle cx="${x}" cy="${y}" r="1" class="node" />`;
      }
      
      // 3. 모든 꼭짓점을 서로 연결하는 내부 점선 그리기 (인접한 테두리 제외)
      let dashedLines = '';
      for (let i = 0; i < innerSides; i++) {
        // j = i + 2를 통해 바로 옆(테두리)에 있는 점과는 연결하지 않음
        for (let j = i + 2; j < innerSides; j++) {
          // 다각형의 첫 점과 마지막 점은 테두리이므로 제외
          if (i === 0 && j === innerSides - 1) continue;
          dashedLines += `<line x1="${coords[i].x}" y1="${coords[i].y}" x2="${coords[j].x}" y2="${coords[j].y}" class="dashed" />`;
        }
      }

      // 렌더링 순서: 내부 점선 -> 테두리(polygon) -> 꼭짓점(원)
      svgContent += dashedLines;
      svgContent += `<polygon points="${points.join(' ')}" />`;
      svgContent += nodes;

      // viewBox를 통해 100x100 정사각형 캔버스 내에 그림 렌더링
      return `
        <svg viewBox="0 0 100 100">
          ${svgContent}
        </svg>
      `;
    }

    function updateClock() {
      const now = new Date();
      
      const rawHours = now.getHours();
      const minutes = now.getMinutes();
      const seconds = now.getSeconds();

      // 시(Hour)는 12시간제로 변환 
      const hours = (rawHours % 12) || 12;

      // 오전(AM) / 오후(PM) 테마 교체
      if (rawHours < 12) {
        document.body.className = "am";
      } else {
        document.body.className = "pm";
      }

      // 화면에 시, 분, 초 렌더링
      clock.innerHTML = createShape(hours) + createShape(minutes) + createShape(seconds);
    }

    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
