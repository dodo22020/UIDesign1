<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minjoo Do - Personal Page</title>
    <style>
        /* 기본 스타일 초기화 */
        body, h1, h2, p, ul, li {
            margin: 0;
            padding: 0;
            list-style: none;
            box-sizing: border-box;
        }

        /* 기본 폰트 설정 (레퍼런스와 유사한 Serif 서체) */
        body {
            font-family: "Times New Roman", Times, serif;
            font-size: 16px;
            color: #333;
            line-height: 1.6;
        }

        /* 전체 컨테이너 (flex 레이아웃 사용) */
        .container {
            display: flex;
            flex-direction: row;
            min-height: 100vh; /* 화면 전체 높이 사용 */
        }

        /* 왼쪽 패널 (노란색 배경) */
        .left-panel {
            flex: 1; /* 컨테이너 너비의 1/2.5 정도 차지 */
            background-color: #fce38a; /* 레퍼런스와 유사한 노란색 */
            display: flex;
            justify-content: center; /* 가로 중앙 정렬 */
            align-items: center; /* 세로 중앙 정렬 */
            padding: 40px;
        }

        .left-panel img {
            max-width: 100%;
            height: auto;
        }

        /* 오른쪽 패널 (흰색 배경) */
        .right-panel {
            flex: 1.5; /* 컨테이너 너비의 1.5/2.5 정도 차지 */
            background-color: #ffffff;
            padding: 40px;
            display: flex;
            flex-direction: column;
        }

        /* 상단 목차 (nav) */
        nav ul {
            display: flex;
            justify-content: flex-end; /* 오른쪽 정렬 */
            gap: 20px; /* 항목 간 간격 */
            font-size: 14px;
            color: #666;
            margin-bottom: 40px;
        }

        nav a {
            text-decoration: none;
            color: inherit;
        }

        nav a:hover {
            color: #333;
            text-decoration: underline;
        }

        /* 본문 내용 */
        .content {
            flex-grow: 1; /* 남은 공간 차지 */
        }

        /* 본문 내 자기소개 패러그래프 */
        .content .intro {
            font-size: 18px;
            margin-bottom: 30px;
            color: #333;
        }

        /* 본문 내 좋아하는 목록 */
        .content .favorites li {
            font-size: 16px;
            color: #555;
            margin-bottom: 15px;
            position: relative;
            padding-left: 20px;
        }

        /* 목록 앞의 점 (•) */
        .content .favorites li::before {
            content: "•";
            position: absolute;
            left: 0;
            color: #333;
            font-size: 1.2em;
        }

        /* 링크 스타일 (Craiglist) */
        .content .favorites a {
            color: purple;
            text-decoration: underline;
        }

        /* 하단 푸터 */
        footer {
            width: 100%;
            border-top: 1px solid #ddd; /* 상단 경계선 */
            padding: 10px 40px;
            font-size: 14px;
            color: #666;
            margin-top: auto; /* 푸터를 하단에 고정 */
        }

        /* 푸터 내 로고 및 이름 */
        footer #logo {
            font-family: serif;
            font-size: 1.1em;
            color: #333;
            margin-bottom: 5px;
        }

        footer #logo span {
            font-size: 1.2em;
        }

    </style>
</head>
<body>

<div class="container">
    <div class="left-panel">
        <img src="shovel.png" alt="삽 일러스트">
    </div>

    <div class="right-panel">
        <nav>
            <ul>
                <li><a href="#food">음식</a></li>
                <li><a href="#song">노래</a></li>
                <li><a href="#website">웹사이트</a></li>
                <li><a href="#about">자기소개</a></li>
            </ul>
        </nav>

        <div class="content">
            <p class="intro">저에 대한 짧은 패러그래프...</p>

            <ul class="favorites">
                <li id="food">내가 좋아하는 음식은 ...</li>
                <li id="song">내가 좋아하는 노래는...</li>
                <li id="website">내가 좋아하는 웹사이트는 <a href="https://www.craigslist.org">Craigslist</a></li>
            </ul>
        </div>

        <footer>
            <div id="logo"><span>( )</span> Minjoo Do</div>
            <div id="about">자기소개</div>
        </footer>
    </div>
</div>

</body>
</html>
