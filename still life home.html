<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>CSS Room Still Life (With Back Button)</title>
  <style>
    /* 모든 요소에 box-sizing 적용 */
    * { box-sizing: border-box; }

    /* 기본 배경 설정 */
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #fdf6e3;
      overflow: hidden;
    }

    /* ⭐️ 뒤로가기 버튼 스타일 ⭐️ */
    .back-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      text-decoration: none;
      color: #333;
      font-family: monospace; /* 메인 페이지와 비슷한 글꼴 느낌 */
      font-size: 16px;
      font-weight: bold;
      z-index: 10;
    }
    .back-btn:hover {
      text-decoration: underline;
    }

    /* 캔버스 */
    .room {
      width: 600px;
      height: 400px;
      position: relative;
      transform: scale(1.5);
    }

    /* --- 카펫 --- */
    .carpet {
      position: absolute;
      width: 220px;
      height: 200px;
      background-color: #add8e6;
      border: 2px solid #333;
      border-radius: 50%;
      left: 190px;
      bottom: 10px;
      z-index: 0;
    }

    /* --- 양쪽 탁자 --- */
    .table {
      position: absolute;
      bottom: 285px;
      width: 80px;
      height: 80px;
      z-index: 1;
    }
    .table.l { left: 45px; } 
    .table.r { left: 475px; } 
    
    .table-top { 
      width: 80px; height: 80px; 
      background: #deb887;
      border: 2px solid #333;
      position: absolute; top: 0; border-radius: 5px; 
      box-shadow: inset 0 -5px 0 rgba(0,0,0,0.1); 
    }

    /* --- 왼쪽 탁자 위 책 --- */
    .book {
      position: absolute;
      top: 20px; left: 15px;
      width: 50px; height: 40px;
      display: flex;
      z-index: 2;
    }
    .page {
      width: 25px; height: 40px;
      background: #ffffff;
      border: 2px solid #333;
    }
    .page.l {
      border-radius: 3px 0 0 3px;
      transform-origin: right center;
      transform: perspective(100px) rotateY(-10deg);
      border-right: 1px solid #333;
    }
    .page.r {
      border-radius: 0 3px 3px 0;
      transform-origin: left center;
      transform: perspective(100px) rotateY(10deg);
      border-left: 1px solid #333;
    }
    .page::after {
      content: ""; position: absolute; top: 5px; left: 3px; right: 3px; bottom: 5px;
      background: repeating-linear-gradient(#ddd, #ddd 1px, transparent 1px, transparent 5px);
    }

    /* --- 오른쪽 탁자 위 태블릿 --- */
    .tablet {
      position: absolute;
      top: 18px; left: 22px;
      width: 35px; height: 45px;
      background: #ecf0f1;
      border: 2px solid #333;
      border-radius: 5px;
      box-shadow: inset 0 0 0 4px #2c3e50;
      z-index: 2;
      transform: rotate(12deg);
    }

    /* --- 실내화 --- */
    .slippers {
      position: absolute;
      bottom: 40px;
      left: 230px;
      z-index: 2;
    }
    .slipper {
      width: 22px; height: 45px;
      background-color: #fffacd;
      border: 2px solid #333;
      border-radius: 12px 12px 8px 8px;
      position: absolute;
    }
    .slipper::after {
      content: ""; position: absolute; top: 15px; left: -2px; right: -2px; height: 16px;
      background-color: #f0e68c;
      border-top: 2px solid #333; border-bottom: 2px solid #333;
    }
    .slipper.l { left: 0; transform: rotate(-15deg); }
    .slipper.r { left: 28px; top: 8px; transform: rotate(10deg); }

    /* --- 침대 --- */
    .bed {
      position: absolute;
      left: 135px; 
      bottom: 35px; 
      width: 330px;
      height: 330px; 
      z-index: 1;
    }
    .headboard { 
      width: 330px; height: 12px; 
      background: #e67e22; 
      border: 2px solid #333;
      position: absolute; bottom: 318px; left: 0; 
      border-radius: 5px; 
    }
    .mattress { 
      width: 310px; height: 305px; 
      background: #ffffff; 
      border: 2px solid #333;
      position: absolute; bottom: 15px; left: 10px; 
      border-radius: 10px; 
    }
    /* 이불 */
    .blanket { 
      width: 270px; 
      height: 200px; 
      background: lightpink; 
      border: 2px solid #333;
      position: absolute; 
      bottom: 15px; 
      left: 30px;
      border-radius: 5px 5px 10px 10px; 
      z-index: 5;
    }

    /* --- 베개 --- */
    .pillow { 
      background: lightpink; 
      border: 2px solid #333;
      position: absolute; 
      z-index: 3; 
    }
    .pillow.p1 { width: 75px; height: 38px; border-radius: 15px; bottom: 255px; left: 40px; transform: rotate(-3deg); }
    .pillow.p2 { width: 75px; height: 38px; border-radius: 15px; bottom: 255px; left: 125px; transform: rotate(2deg); }
    .pillow.p3 { width: 45px; height: 45px; border-radius: 50%; background: #fffacd; bottom: 235px; left: 95px; z-index: 4; }
    .pillow.p4 { width: 90px; height: 25px; border-radius: 12px; background: #add8e6; bottom: 220px; left: 135px; z-index: 4; transform: rotate(-5deg); }

    /* --- 곰돌이 인형 --- */
    .teddy { position: absolute; bottom: 175px; left: 75px; z-index: 6; transform: rotate(-5deg); }
    .teddy .head { 
      width: 35px; height: 35px; background: #d2b48c; border: 2px solid #333;
      border-radius: 50%; position: absolute; bottom: 30px; left: 0; z-index: 6; 
    }
    .teddy .ear { 
      width: 14px; height: 14px; background: #d2b48c; border: 2px solid #333;
      border-radius: 50%; position: absolute; z-index: 5; 
    }
    .teddy .ear.l { bottom: 58px; left: -4px; }
    .teddy .ear.r { bottom: 58px; left: 25px; }
    .teddy .body { 
      width: 30px; height: 35px; background: #d2b48c; border: 2px solid #333;
      border-radius: 15px; position: absolute; bottom: 0; left: 2.5px; z-index: 5; 
    }
    .teddy .head::before, .teddy .head::after { content: ""; width: 3px; height: 3px; background: #333; border-radius: 50%; position: absolute; top: 12px; }
    .teddy .head::before { left: 8px; }
    .teddy .head::after { right: 8px; }
    .teddy .nose { width: 8px; height: 5px; background: #333; border-radius: 4px; position: absolute; top: 18px; left: 11.5px; z-index: 7; }
    .teddy .mouth { width: 10px; height: 6px; border-left: 2px solid #333; border-bottom: 2px solid #333; border-radius: 0 0 10px 10px; position: absolute; top: 21px; left: 10.5px; z-index: 7; transform: rotate(-10deg); }

  </style>
</head>
<body>

  <a href="index.html" class="back-btn">back to main</a>

  <div class="room">
    <div class="carpet"></div>

    <div class="table l">
      <div class="table-top"></div>
      <div class="book">
        <div class="page l"></div>
        <div class="page r"></div>
      </div>
    </div>

    <div class="table r">
      <div class="table-top"></div>
      <div class="tablet"></div>
    </div>

    <div class="slippers">
      <div class="slipper l"></div>
      <div class="slipper r"></div>
    </div>

    <div class="bed">
      <div class="headboard"></div>
      <div class="mattress"></div>
      <div class="blanket"></div>
      
      <div class="pillow p1"></div>
      <div class="pillow p2"></div>
      <div class="pillow p3"></div>
      <div class="pillow p4"></div>
      
      <div class="teddy">
        <div class="ear l"></div>
        <div class="ear r"></div>
        <div class="body"></div>
        <div class="head">
          <div class="nose"></div>
          <div class="mouth"></div>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
